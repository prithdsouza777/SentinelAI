version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  sentinelai:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - SIMULATION_MODE=true
      - CORS_ORIGINS=*
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
